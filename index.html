<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Points Blog Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1e293b; }
  .header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); padding: 32px; color: white; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { color: #94a3b8; margin-top: 4px; font-size: 14px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .week-bar { display: flex; gap: 12px; overflow-x: auto; margin-bottom: 24px; padding-bottom: 4px; }
  .week-btn { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 16px; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #64748b; transition: all 0.15s; }
  .week-btn:hover { border-color: #2563eb; color: #2563eb; }
  .week-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .summary-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; text-align: center; }
  .summary-card .num { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; }
  .summary-card .lbl { font-size: 12px; color: #64748b; margin-top: 4px; font-weight: 500; }
  .summary-card.red .num { color: #dc2626; }
  .summary-card.amber .num { color: #d97706; }
  .summary-card.blue .num { color: #2563eb; }
  .summary-card.green .num { color: #16a34a; }
  .exec-summary { background: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; border: 1px solid #e2e8f0; border-left: 4px solid #2563eb; }
  .exec-summary h3 { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .exec-summary p { font-size: 14px; line-height: 1.7; color: #334155; white-space: pre-line; }
  .filters { background: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filters label { font-size: 13px; font-weight: 600; color: #475569; margin-right: 4px; }
  .filter-btn { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 500; color: #64748b; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
  .filter-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
  .posts-list { display: flex; flex-direction: column; gap: 12px; }
  .post-card { background: white; border-radius: 12px; padding: 18px 20px; border: 1px solid #e2e8f0; border-left: 4px solid #dc2626; }
  .post-card[data-has-llm="true"] { border-left-color: #d97706; }
  .post-card[data-has-stale="true"][data-has-traffic="false"][data-has-llm="false"] { border-left-color: #2563eb; }
  .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px; flex-wrap: wrap; }
  .post-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 4px; color: white; font-weight: 500; }
  .badge.score { background: #7c3aed; }
  .badge.cluster { background: #0f172a; }
  .post-title { font-size: 14px; font-weight: 600; color: #0f172a; text-decoration: none; display: block; margin-bottom: 10px; }
  .post-title:hover { color: #2563eb; text-decoration: underline; }
  .flag-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .flag-item { font-size: 13px; color: #475569; padding: 6px 10px; background: #f8fafc; border-radius: 6px; }
  .empty-state { background: white; border-radius: 12px; padding: 48px; text-align: center; border: 1px solid #e2e8f0; color: #94a3b8; font-size: 15px; }
  .season-banner { background: #fef9c3; border: 1px solid #fde047; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; font-size: 14px; color: #713f12; }
  .report-link { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  @media (max-width: 640px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .filters { flex-direction: column; align-items: flex-start; }
  }
  @media print {
    body { background: white; }
    .week-bar, .filters { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="max-width:1100px;margin:0 auto">
    <h1>🔍 Red Points Blog Monitor</h1>
    <p>KEEP posts only · Updated weekly every Monday · <span style="font-family:'JetBrains Mono',monospace;font-size:12px">Generated July 06, 2026</span></p>
    <p class="report-link">Live report: <a href="https://antonellafilpo.github.io/redpoints-blog-monitor" style="color:#60a5fa">https://antonellafilpo.github.io/redpoints-blog-monitor</a></p>
  </div>
</div>

<div class="container">

  <!-- Week switcher -->
  <div class="week-bar" id="weekBar"></div>

  <!-- Summary cards -->
  <div class="summary-grid" id="summaryCards"></div>

  <!-- Executive summary -->
  <div class="exec-summary">
    <h3>📝 Weekly Executive Summary</h3>
    <p id="execSummary"></p>
  </div>

  <!-- Season banner -->
  <div class="season-banner" id="seasonBanner" style="display:none"></div>

  <!-- Filters -->
  <div class="filters" id="filtersBar">
    <div>
      <label>Flag type:</label>
      <button class="filter-btn active" onclick="setFilter('type','all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('type','traffic',this)">🔴 Traffic</button>
      <button class="filter-btn" onclick="setFilter('type','llm',this)">🟡 LLM</button>
      <button class="filter-btn" onclick="setFilter('type','stale',this)">📅 Stale</button>
    </div>
    <div id="clusterFilters">
      <label>Cluster:</label>
      <button class="filter-btn active" onclick="setFilter('cluster','all',this)">All</button>
    </div>
  </div>

  <!-- Posts list -->
  <div class="posts-list" id="postsList"></div>

</div>

<script>
const WEEKS_DATA = {"2026-06-22": {"week_end": "2026-06-28", "flagged_count": 0, "traffic_count": 0, "llm_count": 0, "stale_count": 0, "summary": "\u2705 All KEEP posts are stable this week. No traffic drops, LLM visibility losses, or stale content alerts. No action needed.", "flagged": [], "season": null}, "2026-06-15": {"week_end": "2026-06-21", "flagged_count": 1, "traffic_count": 1, "llm_count": 0, "stale_count": 0, "summary": "Executive summary unavailable this week (1 posts flagged \u2014 see full report).", "flagged": [{"path": "/blog/how-to-track-a-fake-instagram-account/", "url": "https://www.redpoints.com/blog/how-to-track-a-fake-instagram-account/", "title": "Smart way to track a fake Instagram account", "cluster": "Social Media Takedown", "score": 13, "tier": "tier1", "flags": [{"type": "traffic", "label": "\ud83d\udd34 Traffic Drop", "detail": "Clicks dropped to 123 this week vs 202 12-week average (\u221239%, \u221279 clicks)", "current": 123, "baseline": 202.2, "drop_pct": 39.2, "diagnosis": {"query_breakdown": [{"query": "rastrear cuenta de instagram con url", "prev_clicks": 2, "curr_clicks": 0, "change": -2}, {"query": "can fake instagram account be traced", "prev_clicks": 1, "curr_clicks": 0, "change": -1}, {"query": "aplikasi melacak akun fake instagram", "prev_clicks": 1, "curr_clicks": 0, "change": -1}, {"query": "como rastrear una cuenta falsa de instagram", "prev_clicks": 0, "curr_clicks": 2, "change": 2}, {"query": "cara melacak ig yang tidak dikenal", "prev_clicks": 0, "curr_clicks": 2, "change": 2}], "primary_keyword": "rastrear cuenta de instagram con url", "impressions_signal": "stable", "competitors": [], "our_position_now": 8.5, "our_position_prev": 7.8, "root_cause": "ctr_problem", "verdict": "CTR problem \u2014 impressions are stable but clicks fell. This means we still rank in the same position but fewer people are clicking. Likely cause: a SERP feature (AI Overview, featured snippet, or knowledge panel) now appears above organic results and is absorbing clicks.", "recommended_action": "Search the primary keyword in Google and check what SERP features appear. If an AI Overview is present, reformat the post intro as a direct, concise answer to the query. Update the title tag and meta description to be more click-worthy."}, "content_brief_html": ""}], "gsc_clicks_this_week": 123, "llm_citations_this_week": 0}]}, "2026-06-08": {"week_end": "2026-06-14", "flagged_count": 1, "traffic_count": 1, "llm_count": 0, "stale_count": 0, "summary": "Executive summary unavailable this week (1 posts flagged \u2014 see full report).", "flagged": [{"path": "/blog/how-to-track-a-fake-instagram-account/", "url": "https://www.redpoints.com/blog/how-to-track-a-fake-instagram-account/", "title": "Smart way to track a fake Instagram account", "cluster": "Social Media Takedown", "score": 13, "tier": "tier1", "flags": [{"type": "traffic", "label": "\ud83d\udd34 Traffic Drop", "detail": "Clicks dropped to 94 this week vs 219 12-week average (\u221257%, \u2212125 clicks)", "current": 94, "baseline": 219.4, "drop_pct": 57.1, "diagnosis": {"query_breakdown": [{"query": "lacak akun ig", "prev_clicks": 2, "curr_clicks": 0, "change": -2}, {"query": "how to find fake instagram account location", "prev_clicks": 2, "curr_clicks": 0, "change": -2}, {"query": "melacak ig", "prev_clicks": 2, "curr_clicks": 0, "change": -2}, {"query": "como rastrear una cuenta de instagram falsa", "prev_clicks": 5, "curr_clicks": 4, "change": -1}, {"query": "rastrear cuenta de instagram", "prev_clicks": 3, "curr_clicks": 3, "change": 0}], "primary_keyword": "lacak akun ig", "impressions_signal": "stable", "competitors": [], "our_position_now": 7.8, "our_position_prev": 7.0, "root_cause": "ctr_problem", "verdict": "CTR problem \u2014 impressions are stable but clicks fell. This means we still rank in the same position but fewer people are clicking. Likely cause: a SERP feature (AI Overview, featured snippet, or knowledge panel) now appears above organic results and is absorbing clicks.", "recommended_action": "Search the primary keyword in Google and check what SERP features appear. If an AI Overview is present, reformat the post intro as a direct, concise answer to the query. Update the title tag and meta description to be more click-worthy."}, "content_brief_html": ""}], "gsc_clicks_this_week": 94, "llm_citations_this_week": 0}]}, "2026-06-01": {"week_end": "2026-06-07", "flagged_count": 1, "traffic_count": 1, "llm_count": 0, "stale_count": 0, "summary": "\ud83d\udd34 Our blog post about tracking fake Instagram accounts lost 42% of its traffic this week, dropping from 226 to just 131 clicks. This suggests people aren't finding our content when searching for help with fake accounts, so we should check if competitors are ranking higher and optimize our SEO.\n\n\ud83d\udfe1 The traffic drop happened on a post about social media takedowns, which is one of our core services. We need to investigate if this is part of a broader trend affecting our social media protection content and consider refreshing the post with updated information.\n\n\ud83d\udcc5 Since this post normally performs well (226 average clicks), we should monitor it closely next week to see if this was a temporary dip or the start of a bigger problem. If traffic doesn't recover, we'll need to revise our content strategy for social media protection topics.", "flagged": [{"path": "/blog/how-to-track-a-fake-instagram-account/", "url": "https://www.redpoints.com/blog/how-to-track-a-fake-instagram-account/", "title": "Smart way to track a fake Instagram account", "cluster": "Social Media Takedown", "score": 13, "tier": "tier1", "flags": [{"type": "traffic", "label": "\ud83d\udd34 Traffic Drop", "detail": "Clicks dropped to 131 this week vs 226 12-week average (\u221242%, \u221295 clicks)", "current": 131, "baseline": 226.3, "drop_pct": 42.1, "diagnosis": {"query_breakdown": [{"query": "melacak akun ig dengan username", "prev_clicks": 3, "curr_clicks": 0, "change": -3}, {"query": "como rastrear un instagram falso", "prev_clicks": 2, "curr_clicks": 0, "change": -2}, {"query": "cara melacak akun ig fake", "prev_clicks": 3, "curr_clicks": 1, "change": -2}, {"query": "rastrear cuenta de instagram", "prev_clicks": 4, "curr_clicks": 3, "change": -1}, {"query": "como rastrear una cuenta de instagram falsa", "prev_clicks": 4, "curr_clicks": 5, "change": 1}], "primary_keyword": "melacak akun ig dengan username", "impressions_signal": "drop", "competitors": [], "our_position_now": 7.0, "our_position_prev": 7.6, "root_cause": "unknown", "verdict": "Traffic dropped but the pattern is unclear \u2014 impressions and position data are insufficient to confirm a single root cause this week. Monitor for a second consecutive week before taking action.", "recommended_action": "Watch this post next Monday. If it drops again, run a manual GSC check and compare against competitor rankings on the primary keyword."}, "content_brief_html": ""}], "gsc_clicks_this_week": 131, "llm_citations_this_week": 0}]}};
const ALL_CLUSTERS = [];
const CURRENT_WEEK = "2026-06-22";

let activeWeek = CURRENT_WEEK;
let activeTypeFilter = 'all';
let activeClusterFilter = 'all';

function init() {
  renderWeekBar();
  renderClusterFilters();
  renderWeek(activeWeek);
}

function renderWeekBar() {
  const bar = document.getElementById('weekBar');
  const weeks = Object.keys(WEEKS_DATA).sort().reverse();
  bar.innerHTML = weeks.map(wk => {
    const d = WEEKS_DATA[wk];
    const label = `Week of ${wk}`;
    const flagTxt = d.flagged_count > 0 ? ` · ${d.flagged_count} flags` : ' · ✅ stable';
    return `<button class="week-btn ${wk === activeWeek ? 'active' : ''}" onclick="switchWeek('${wk}', this)">${label}${flagTxt}</button>`;
  }).join('');
}

function renderClusterFilters() {
  const container = document.getElementById('clusterFilters');
  const allClusters = [...new Set(
    Object.values(WEEKS_DATA).flatMap(w => (w.flagged || []).map(p => p.cluster))
  )].sort();
  const btns = allClusters.map(c =>
    `<button class="filter-btn" onclick="setFilter('cluster','${c}',this)">${c}</button>`
  ).join('');
  container.innerHTML = `<label>Cluster:</label><button class="filter-btn active" onclick="setFilter('cluster','all',this)">All</button>${btns}`;
}

function switchWeek(wk, btn) {
  activeWeek = wk;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWeek(wk);
}

function setFilter(type, value, btn) {
  if (type === 'type') {
    activeTypeFilter = value;
    document.querySelectorAll('.filters .filter-btn').forEach(b => {
      if (b.closest('#filtersBar > div:first-child')) b.classList.remove('active');
    });
  } else {
    activeClusterFilter = value;
    document.querySelectorAll('#clusterFilters .filter-btn').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  renderPosts(WEEKS_DATA[activeWeek]?.flagged || []);
}

function renderWeek(wk) {
  const data = WEEKS_DATA[wk];
  if (!data) return;

  // Summary cards
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card red"><div class="num">${data.traffic_count}</div><div class="lbl">🔴 Traffic Drops</div></div>
    <div class="summary-card amber"><div class="num">${data.llm_count}</div><div class="lbl">🟡 LLM Drops</div></div>
    <div class="summary-card blue"><div class="num">${data.stale_count}</div><div class="lbl">📅 Stale Posts</div></div>
    <div class="summary-card green"><div class="num">${34 - data.flagged_count}</div><div class="lbl">✅ Stable Posts</div></div>
  `;

  // Executive summary
  document.getElementById('execSummary').textContent = data.summary || 'No summary available.';

  // Season banner
  const banner = document.getElementById('seasonBanner');
  if (data.season) {
    banner.textContent = `⏸️ Alert suppression active — ${data.season} period. Baseline calculation resumes next week.`;
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }

  renderPosts(data.flagged || []);
}

function renderPosts(posts) {
  const container = document.getElementById('postsList');

  const filtered = posts.filter(p => {
    const typeMatch = activeTypeFilter === 'all' ||
      p.flags.some(f => f.type === activeTypeFilter);
    const clusterMatch = activeClusterFilter === 'all' ||
      p.cluster === activeClusterFilter;
    return typeMatch && clusterMatch;
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">✅ No posts match the current filters this week.</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => {
    const hasTraffic = p.flags.some(f => f.type === 'traffic');
    const hasLlm = p.flags.some(f => f.type === 'llm');
    const hasStale = p.flags.some(f => f.type === 'stale');
    const flagItems = p.flags.map(f =>
      `<li class="flag-item">${f.label}: ${f.detail}</li>`
    ).join('');
    return `
      <div class="post-card"
           data-has-traffic="${hasTraffic}"
           data-has-llm="${hasLlm}"
           data-has-stale="${hasStale}">
        <div class="post-header">
          <div class="post-badges">
            <span class="badge score">Score ${p.score}/14</span>
            <span class="badge cluster">${p.cluster}</span>
            ${hasTraffic ? '<span class="badge" style="background:#dc2626">🔴 Traffic</span>' : ''}
            ${hasLlm ? '<span class="badge" style="background:#d97706">🟡 LLM</span>' : ''}
            ${hasStale ? '<span class="badge" style="background:#2563eb">📅 Stale</span>' : ''}
          </div>
        </div>
        <a href="${p.url}" class="post-title" target="_blank">${p.title}</a>
        <ul class="flag-list">${flagItems}</ul>
      </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
